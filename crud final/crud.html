<!DOCTYPE html>
<html>

<head>
    <title>Career Recommender</title>

    <style>
  body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

/* MAIN LAYOUT (SIDE BY SIDE) */
.container {
    width: 90%;
    margin: auto;
}

body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    margin: 0;
}

/* MAIN LAYOUT */
.container {
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: 1fr 2fr; /* left form, right cards */
    gap: 20px;
    margin-top: 20px;
}

/* FORM CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

/* INPUT */
input {
    margin: 8px 0;
    padding: 10px;
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* CHECKBOX */
label {
    display: block;
    margin: 5px 0;
}

/* BUTTON */
button {
    padding: 10px;
    margin-top: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* BUTTON COLORS */
.delete {
    background: #e53e3e;
}

.edit {
    background: #ed8936;
}

/* CARDS GRID */
#userCards {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 cards per row */
    gap: 15px;
}

/* USER CARD */
.user-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}


    </style>
</head>

<body>

    <div class="container">

        <h2>Career Recommender</h2>

        <div class="card">

            <input type="text" id="name" placeholder="Enter Name"><br>
            <input type="number" id="age" placeholder="Enter Age"><br>
            <input type="text" id="course" placeholder="Enter Course"><br>

            <h3>Select Skills:</h3>

            <label><input type="checkbox" value="html"> HTML</label><br>
            <label><input type="checkbox" value="css"> CSS</label><br>
            <label><input type="checkbox" value="java"> Java</label><br>
            <label><input type="checkbox" value="python"> Python</label><br>
            <label><input type="checkbox" value="communication"> Communication</label><br>

            <br>
            <button onclick="addUser()">Add User</button>
            <div style="clear: both;"></div>

        </div>

        <div id="userCards"></div>

    </div>

    <script>

        let users = JSON.parse(localStorage.getItem("users")) || [];

        function getSelectedSkills() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            let skills = [];

            checkboxes.forEach(function (cb) {
                skills.push(cb.value);
            });

            return skills;
        }

        function getCareers(skills) {

            let careers = [];

            if (skills.includes("html") && skills.includes("css")) {
                careers.push("Frontend Developer");
            }

            if (skills.includes("java")) {
                careers.push("Backend Developer");
            }

            if (skills.includes("python")) {
                careers.push("Data Analyst");
            }

            if (skills.includes("communication")) {
                careers.push("Marketing / HR");
            }

            if (careers.length === 0) {
                careers.push("No match found");
            }

            return careers;
        }

        function addUser() {

            let name = document.getElementById("name").value;
            let age = document.getElementById("age").value;
            let course = document.getElementById("course").value;
            let skills = getSelectedSkills();

            if (name === "" || age === "" || course === "" || skills.length === 0) {
                alert("Fill all fields");
                return;
            }

            let careers = getCareers(skills);

            let user = {
                name: name,
                age: age,
                course: course,
                skills: skills,
                careers: careers
            };

            users.push(user);

            localStorage.setItem("users", JSON.stringify(users));

            displayUsers();
            clearForm();
        }

        function displayUsers() {

            let container = document.getElementById("userCards");
            container.innerHTML = "";

            users.forEach(function (user, index) {

                container.innerHTML += `
                <div class="user-card">
                    <h3>${user.name}</h3>
                    <p><b>Age:</b> ${user.age}</p>
                    <p><b>Course:</b> ${user.course}</p>
                    <p><b>Skills:</b> ${user.skills.join(", ")}</p>
                    <p><b>Careers:</b> ${user.careers.join(", ")}</p>

                    <button class="edit" onclick="editUser(${index})">Edit</button>
                    <button class="delete" onclick="deleteUser(${index})">Delete</button>
                </div>
                `;
            });
        }

        function deleteUser(index) {
            users.splice(index, 1);
            localStorage.setItem("users", JSON.stringify(users));
            displayUsers();
        }

        function editUser(index) {

            let user = users[index];

            document.getElementById("name").value = user.name;
            document.getElementById("age").value = user.age;
            document.getElementById("course").value = user.course;

            // uncheck all
            document.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
                cb.checked = false;
            });

            // check saved skills
            user.skills.forEach(function (skill) {
                let box = document.querySelector('input[value="' + skill + '"]');
                if (box) box.checked = true;
            });

            deleteUser(index);
        }

        function clearForm() {
            document.getElementById("name").value = "";
            document.getElementById("age").value = "";
            document.getElementById("course").value = "";

            document.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
                cb.checked = false;
            });
        }

        displayUsers();

    </script>

</body>

</html>
